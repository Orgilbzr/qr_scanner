```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
text-align:center;
margin:20px;
background:#fafafa;
}

h2{
margin-bottom:20px;
}

#reader{
width:320px;
margin:auto;
}

#status{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>QR Check-In Scanner</h2>

<div id="reader"></div>

<p id="status">QR кодоо уншуулна уу</p>

<script>

const statusEl = document.getElementById("status")
let scanner

function setStatus(text,color){
statusEl.textContent=text
statusEl.style.color=color
}

function onScanSuccess(text){

scanner.pause()

setStatus("Уншиж байна...","#444")

fetch("https://script.google.com/macros/s/AKfycbzjCQb7rfn6vfitxsSNu2t8VR_hUe_SyZH9FN7QGhVDjMnCiKqmpjgXQO5lFplS2d3stw/exec?caseNo="+text)

.then(r=>r.text())

.then(res=>{

if(res=="OK"){
setStatus("✅ Амжилттай бүртгэгдлээ","green")
}

else if(res=="ALREADY"){
setStatus("⚠️ Аль хэдийн бүртгэгдсэн","#d97706")
}

else{
setStatus("❌ Бүртгэл олдсонгүй","crimson")
}

})

.catch(()=>{
setStatus("❌ Сүлжээ эсвэл серверийн алдаа","crimson")
})

.finally(()=>{
setTimeout(()=>{
scanner.resume()
},2000)
})

}

scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:{width:250,height:250},
rememberLastUsedCamera:true
}
)

scanner.render(onScanSuccess)

</script>

</body>
</html>
```
